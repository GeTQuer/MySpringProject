<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1e1e1e;
            color: white;
            margin: 0;
        }
        .form-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 300px;
            background-color: #2d2d2d;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
        }
        h3 {
            text-align: center;
            color: #4caf50;
            font-size: 24px;
            margin-top: 0;
            margin-bottom: 10px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        label {
            font-size: 14px;
        }
        input {
            padding: 10px;
            border-radius: 4px;
            border: none;
            background-color: #3d3d3d;
            color: white;
            font-size: 16px;
            width: 100%;
            box-sizing: border-box;
        }
        button {
            padding: 10px;
            border-radius: 4px;
            border: none;
            background-color: #4caf50;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
            width: 100%;
        }
        button:hover {
            background-color: #45a049;
        }
        .alert {
            color: #f44336;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h3>Вход в систему</h3>
    <div id="errorBox" class="alert d-none" role="alert"></div>

    <form id="loginForm">
        <div class="form-group">
            <label>Логин</label>
            <input type="text" id="username" required>
        </div>
        <div class="form-group">
            <label>Пароль</label>
            <input type="password" id="password" required>
        </div>
        <button type="submit">Войти</button>
    </form>
</div>

<script>
    // Находим форму по ID и "слушаем" событие её отправки (submit)
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        // Отменяем стандартное поведение браузера (чтобы страница не перезагружалась)
        e.preventDefault();

        // Считываем то, что пользователь ввел в поля
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        try {
            // Отправляем POST запрос в Java
            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                // Превращаем переменные в строку JSON
                body: JSON.stringify({ username: username, password: password })
            });

            // Если статус 200 OK
            if (response.ok) {
                // Читаем ответ от Java как обычный текст
                const textData = await response.text();

                let finalToken = textData;
                // Если Java всё-таки отдает JSON формата {"token": "eyJ..."}, достаем из него
                if (textData.startsWith("{")) {
                    finalToken = JSON.parse(textData).token;
                }

                // Сохраняем токен в память браузера
                localStorage.setItem('jwt_token', finalToken);
                // Перенаправляем на страницу задач
                window.location.href = '/tasks.html';
            } else {
                // Показываем блок с ошибкой
                document.getElementById('errorBox').textContent = "Неверный логин или пароль";
                document.getElementById('errorBox').classList.remove('d-none');
            }
        } catch (err) {
            console.error("Ошибка сети", err);
        }
    });
</script>
</body>
</html>
