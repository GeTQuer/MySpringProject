<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">
<div class="card shadow p-4" style="width: 350px;">
    <h3 class="text-center mb-4">Вход в систему</h3>
    <div id="errorBox" class="alert alert-danger d-none" role="alert"></div>

    <form id="loginForm">
        <div class="mb-3">
            <label>Логин</label>
            <input type="text" id="username" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Пароль</label>
            <input type="password" id="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Войти</button>
    </form>
</div>

<script>
    // Находим форму по ID и "слушаем" событие её отправки (submit)
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        // Отменяем стандартное поведение браузера (чтобы страница не перезагружалась)
        e.preventDefault();

        // Считываем то, что пользователь ввел в поля
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        try {
            // Отправляем POST запрос в Java
            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                // Превращаем переменные в строку JSON
                body: JSON.stringify({ username: username, password: password })
            });

            // Если статус 200 OK
            if (response.ok) {
                // Читаем ответ от Java как обычный текст
                const textData = await response.text();

                let finalToken = textData;
                // Если Java всё-таки отдает JSON формата {"token": "eyJ..."}, достаем из него
                if (textData.startsWith("{")) {
                    finalToken = JSON.parse(textData).token;
                }

                // Сохраняем токен в память браузера
                localStorage.setItem('jwt_token', finalToken);
                // Перенаправляем на страницу задач
                window.location.href = '/tasks';
            } else {
                // Показываем блок с ошибкой
                document.getElementById('errorBox').textContent = "Неверный логин или пароль";
                document.getElementById('errorBox').classList.remove('d-none');
            }
        } catch (err) {
            console.error("Ошибка сети", err);
        }
    });
</script>
</body>
</html>
