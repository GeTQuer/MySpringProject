<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Панель администратора</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: Arial, sans-serif; }
        .alert-container { min-height: 50px; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="#">Панель управления</a>
        <div class="collapse navbar-collapse">
            <div class="navbar-nav">
                <a class="nav-link active" href="/admin">Пользователи и Роли</a>
                <a class="nav-link" href="/tasks">Все Задачи</a>
            </div>
        </div>
        <button class="btn btn-outline-light btn-sm" onclick="logout()">Выйти</button>
    </div>
</nav>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Управление правами пользователей</h2>
    </div>

    <div class="alert-container">
        <div id="statusMessage" class="alert d-none" role="alert"></div>
    </div>

    <div class="card shadow">
        <div class="card-body p-0">
            <table class="table table-hover align-middle mb-0" id="usersTable">
                <thead class="table-dark">
                <tr>
                    <th style="width: 10%">ID</th>
                    <th style="width: 40%">Логин (Username)</th>
                    <th style="width: 25%">Текущая роль</th>
                    <th style="width: 25%">Действия</th>
                </tr>
                </thead>
                <tbody id="usersTableBody">
                </tbody>
            </table>
            <div id="pagination-controls" class="d-flex justify-content-center m-3 gap-2"></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const token = sessionStorage.getItem('jwt_token');

    if (!token) {
        window.location.href = '/login';
    }

    const authHeaders = {
        'Authorization': 'Bearer ' + token,
        'Content-Type': 'application/json'
    };

    // Переменные пагинации
    let currentPage = 0;
    const pageSize = 15;

    document.addEventListener('DOMContentLoaded', () => fetchUsers(0));

    function logout() {
        sessionStorage.removeItem('jwt_token');
        window.location.href = '/login';
    }

    // --- Универсальная функция отрисовки кнопок страниц ---
    function renderPagination(totalPages, currentPageNumber, containerId, fetchFunction) {
        const container = document.getElementById(containerId);
        if (!container) return;
        container.innerHTML = '';

        if (totalPages <= 1) return;

        const prevBtn = document.createElement('button');
        prevBtn.className = 'btn btn-outline-secondary btn-sm';
        prevBtn.innerText = '← Назад';
        prevBtn.disabled = (currentPageNumber === 0);
        prevBtn.onclick = () => fetchFunction(currentPageNumber - 1);
        container.appendChild(prevBtn);

        for (let i = 0; i < totalPages; i++) {
            const pageBtn = document.createElement('button');
            pageBtn.className = `btn btn-sm ${i === currentPageNumber ? 'btn-primary' : 'btn-outline-primary'}`;
            pageBtn.innerText = i + 1;
            pageBtn.onclick = () => fetchFunction(i);
            container.appendChild(pageBtn);
        }

        const nextBtn = document.createElement('button');
        nextBtn.className = 'btn btn-outline-secondary btn-sm';
        nextBtn.innerText = 'Вперед →';
        nextBtn.disabled = (currentPageNumber === totalPages - 1);
        nextBtn.onclick = () => fetchFunction(currentPageNumber + 1);
        container.appendChild(nextBtn);
    }

    // --- GET: Получение всех пользователей с пагинацией ---
    async function fetchUsers(page = 0) {
        currentPage = page;
        try {
            const response = await fetch(`/roles?page=${page}&size=${pageSize}`, {
                method: 'GET',
                headers: authHeaders
            });

            if (response.status === 401 || response.status === 403) {
                logout();
                return;
            }

            if (!response.ok) {
                throw new Error('Не удалось загрузить пользователей. Ошибка сервера.');
            }

            const data = await response.json();
            // Поддержка и Page<T> и List<T>
            const users = data.content !== undefined ? data.content : data;

            renderTable(users);

            if (data.totalPages !== undefined) {
                renderPagination(data.totalPages, data.number, 'pagination-controls', fetchUsers);
            } else {
                document.getElementById('pagination-controls').innerHTML = '';
            }
        } catch (error) {
            showStatus(error.message, 'danger');
        }
    }

    function renderTable(users) {
        const tbody = document.getElementById('usersTableBody');
        tbody.innerHTML = '';

        users.forEach(user => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><strong class="text-muted">${user.id}</strong></td>
                <td><strong>${user.username}</strong></td>
                <td><span class="badge bg-secondary fs-6">${user.role}</span></td>
                <td>
                    <div class="input-group input-group-sm">
                        <select class="form-select" id="role-select-${user.id}">
                            <option value="USER" ${user.role === 'USER' ? 'selected' : ''}>Пользователь</option>
                            <option value="MANAGER" ${user.role === 'MANAGER' ? 'selected' : ''}>Руководитель</option>
                            <option value="ADMIN" ${user.role === 'ADMIN' ? 'selected' : ''}>Администратор</option>
                        </select>
                        <button class="btn btn-primary" onclick="upgradeRole(${user.id})">Сохранить</button>
                    </div>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    async function upgradeRole(userId) {
        const selectElement = document.getElementById(`role-select-${userId}`);
        const newRoleValue = selectElement.value;

        try {
            const response = await fetch(`/roles/${userId}?newRole=${newRoleValue}`, {
                method: 'PUT',
                headers: authHeaders
            });

            if (response.ok) {
                showStatus(`Роль для ID ${userId} успешно изменена на ${newRoleValue}. Пользователю нужно перезайти в систему.`, 'success');
                fetchUsers(currentPage); // Обновляем текущую страницу после изменения
            } else if (response.status === 403) {
                showStatus('У вас недостаточно прав для изменения ролей', 'danger');
            } else {
                throw new Error('Не удалось обновить роль. Ошибка: ' + response.status);
            }
        } catch (error) {
            showStatus(error.message, 'danger');
        }
    }

    function showStatus(message, type) {
        const statusDiv = document.getElementById('statusMessage');
        statusDiv.textContent = message;
        statusDiv.className = `alert alert-${type}`;
        statusDiv.classList.remove('d-none');

        setTimeout(() => {
            statusDiv.classList.add('d-none');
        }, 4000);
    }
</script>
</body>
</html>
