<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Список задач</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Стили, чтобы админская кнопка не сливалась с остальными */
        .admin-nav-btn {
            color: #ffc107 !important;
            font-weight: bold;
            border: 1px solid #ffc107;
            border-radius: 6px;
            padding: 4px 12px !important;
            margin-left: 15px;
            transition: all 0.2s ease;
        }
        .admin-nav-btn:hover {
            background-color: #ffc107;
            color: #212529 !important;
        }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="#">Трекер задач</a>
        <div class="collapse navbar-collapse">
            <div class="navbar-nav" id="navLinks">
                <a class="nav-link active" href="/tasks">Мои Задачи</a>
            </div>
        </div>
        <button class="btn btn-outline-light btn-sm" onclick="logout()">Выйти</button>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Список задач</h2>
        <button id="addTaskBtn" class="btn btn-success shadow-sm" data-bs-toggle="modal" data-bs-target="#addTaskModal">
            + Добавить задачу
        </button>
    </div>

    <div class="row mb-4 bg-white p-3 rounded shadow-sm border mx-0">
        <div class="col-md-4">
            <label class="form-label small text-muted">Поиск по описанию</label>
            <input type="text" id="searchInput" class="form-control" placeholder="Введите текст...">
        </div>
        <div class="col-md-3">
            <label class="form-label small text-muted">Фильтр по статусу</label>
            <select id="statusFilter" class="form-select">
                <option value="ALL">Все статусы</option>
                <option value="OPEN">OPEN</option>
                <option value="IN_PROGRESS">IN_PROGRESS</option>
                <option value="DONE">DONE</option>
                <option value="CANCELLED">CANCELLED</option>
            </select>
        </div>
        <div class="col-md-5 border-start" id="adminDeleteBlock">
            <label class="form-label small text-muted">Быстрое удаление</label>
            <div class="input-group">
                <input type="number" id="deleteIdInput" class="form-control" placeholder="Введите ID задачи">
                <button class="btn btn-danger" id="deleteByIdBtn">Удалить</button>
            </div>
        </div>
    </div>

    <div class="card shadow">
        <div class="card-body">
            <table class="table align-middle" id="tasksTable">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Описание</th>
                    <th>Сотрудник</th>
                    <th>Статус</th>
                    <th>Действия</th>
                </tr>
                </thead>
                <tbody id="tasksBody">
                </tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="addTaskModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Новая задача</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="createTaskForm">
                    <div class="mb-3">
                        <label class="form-label">Описание задачи</label>
                        <input type="text" class="form-control" id="taskContent" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Сотрудник</label>
                        <input type="text" class="form-control" id="taskEmployee" required>
                    </div>
                    <div class="mb-3" id="assigneeContainer" style="display:none;">
                        <label class="form-label">Назначить задачу пользователю</label>
                        <select class="form-select" id="taskAssignee">
                            <option value="">Себе</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                <button type="button" class="btn btn-primary" id="saveTaskBtn">Сохранить</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="editTaskModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Редактирование задачи № <span id="editTaskIdLabel"></span></h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="editTaskForm">
                    <input type="hidden" id="editTaskId">
                    <div class="mb-3">
                        <label class="form-label">Описание задачи</label>
                        <input type="text" class="form-control" id="editTaskContent" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Сотрудник</label>
                        <input type="text" class="form-control" id="editTaskEmployee" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Статус</label>
                        <select class="form-select" id="editTaskStatus">
                            <option value="OPEN">OPEN</option>
                            <option value="IN_PROGRESS">IN_PROGRESS</option>
                            <option value="DONE">DONE</option>
                            <option value="CANCELLED">CANCELLED</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                <button type="button" class="btn btn-primary" id="updateTaskBtn">Изменить</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const token = localStorage.getItem('jwt_token');
    if (!token) window.location.href = '/login';

    let currentRowElement = null;

    // Парсинг JWT
    function parseJwt(token) {
        try {
            const base64Url = token.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            const jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            return JSON.parse(jsonPayload);
        } catch (e) {
            return null;
        }
    }

    // Железобетонное определение роли
    const decodedToken = parseJwt(token);
    console.log("JWT токен в системе:", decodedToken);

    let isAdmin = false;
    let isManager = false;
    if (decodedToken) {
        const role = decodedToken.role;
        if (role === 'ROLE_ADMIN') isAdmin = true;
        else if (role === 'ROLE_MANAGER') isManager = true;
    }
    console.log("isAdmin:", isAdmin, "isManager:", isManager);

    // Настройка интерфейса под роль
    document.addEventListener('DOMContentLoaded', () => {
        if (isAdmin) {
            document.getElementById('addTaskBtn').style.display = 'none';
            document.getElementById('adminDeleteBlock').style.display = 'none';
            document.getElementById('navLinks').innerHTML += `<a class="nav-link admin-nav-btn" href="/admin">⚙️ Админ панель</a>`;
        } else if (isManager) {
            // Скрываем блок удаления, но оставляем кнопку добавления (она и так видна)
            document.getElementById('adminDeleteBlock').style.display = 'none';
            // По желанию можно добавить кнопку перехода в админку (если у менеджера есть доступ к админ-панели – обычно нет)
            // Но можно ничего не добавлять
        }
        loadTasks();
    });

    function logout() {
        localStorage.removeItem('jwt_token');
        window.location.href = '/login';
    }

    // --- GET: Загрузка задач ---
    async function loadTasks() {
        let url;
        if (isAdmin || isManager) {
            url = '/api/tasks/all';
        } else {
            url = '/api/tasks/my';
        }
        const response = await fetch(url, {
            headers: { 'Authorization': `Bearer ${token}` }
        });

        if (response.ok) {
            const tasks = await response.json();
            const tbody = document.getElementById('tasksBody');
            tbody.innerHTML = '';
            tasks.forEach(task => addRowToTable(task));
        } else {
            logout();
        }
    }

    function addRowToTable(task) {
        const tbody = document.getElementById('tasksBody');
        const tr = document.createElement('tr');

        let actionButtons = `<button class="btn btn-sm btn-primary me-1" onclick="openEditModal(${task.id}, this)">Редактировать</button>`;

        // Только обычные юзеры могут удалять строки напрямую
        if (!isAdmin && !isManager) {
            actionButtons += `<button class="btn btn-sm btn-danger" onclick="deleteTask(${task.id}, this)">Удалить</button>`;
        }

        tr.innerHTML = `
                <td class="task-id">${task.id}</td>
                <td class="task-content">${task.content}</td>
                <td class="task-employee">${task.fullNameEmployee}</td>
                <td class="task-status"><span class="badge bg-primary">${task.status}</span></td>
                <td>${actionButtons}</td>
            `;
        tbody.appendChild(tr);
    }

    // --- POST: Создание задачи ---
    document.getElementById('saveTaskBtn').addEventListener('click', async () => {
        if (isAdmin) return;

        const payload = {
            content: document.getElementById('taskContent').value,
            fullNameEmployee: document.getElementById('taskEmployee').value,
            status: "OPEN"
        };

        // Если менеджер или админ – добавляем получателя
        if (isManager || isAdmin) {
            const assignee = document.getElementById('taskAssignee').value;
            if (assignee) {
                payload.assignedUsername = assignee;
            }
        }

        const response = await fetch('/api/tasks', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify(payload)
        });

        if (response.ok) {
            const newTask = await response.json();
            addRowToTable(newTask);
            bootstrap.Modal.getInstance(document.getElementById('addTaskModal')).hide();
            document.getElementById('createTaskForm').reset();
            // Сбрасываем селект
            document.getElementById('taskAssignee').value = '';
        } else {
            alert("Ошибка при сохранении задачи");
        }
    });

    // --- DELETE: Удаление по кнопке в строке ---
    async function deleteTask(taskId, btnElement) {
        if (isAdmin || isManager) {
            alert("У вас нет прав на удаление задач.");
            return;
        }
        if (!confirm("Точно удалить?")) return;

        const response = await fetch(`/api/tasks/${taskId}`, {
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${token}` }
        });

        if (response.ok) {
            btnElement.closest('tr').remove();
        } else {
            alert("Ошибка при удалении задачи");
        }
    }

    // --- PUT: Открытие модалки редактирования ---
    function openEditModal(taskId, btnElement) {
        currentRowElement = btnElement.closest('tr');

        const currentContent = currentRowElement.querySelector('.task-content').textContent;
        const currentEmployee = currentRowElement.querySelector('.task-employee').textContent;
        const currentStatus = currentRowElement.querySelector('.task-status').textContent;

        document.getElementById('editTaskId').value = taskId;
        document.getElementById('editTaskIdLabel').textContent = taskId;
        document.getElementById('editTaskContent').value = currentContent;
        document.getElementById('editTaskEmployee').value = currentEmployee;
        document.getElementById('editTaskStatus').value = currentStatus;

        const editModal = new bootstrap.Modal(document.getElementById('editTaskModal'));
        editModal.show();
    }

    // Сохранение изменений редактирования
    document.getElementById('updateTaskBtn').addEventListener('click', async () => {
        const taskId = document.getElementById('editTaskId').value;

        const payload = {
            content: document.getElementById('editTaskContent').value,
            fullNameEmployee: document.getElementById('editTaskEmployee').value,
            status: document.getElementById('editTaskStatus').value
        };

        const response = await fetch(`/api/tasks/${taskId}`, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify(payload)
        });

        if (response.ok) {
            const updatedTask = await response.json();
            currentRowElement.querySelector('.task-content').textContent = updatedTask.content;
            currentRowElement.querySelector('.task-employee').textContent = updatedTask.fullNameEmployee;
            currentRowElement.querySelector('.task-status').innerHTML = `<span class="badge bg-primary">${updatedTask.status}</span>`;
            bootstrap.Modal.getInstance(document.getElementById('editTaskModal')).hide();
        } else {
            alert("Ошибка при обновлении задачи");
        }
    });

    // --- ФИЛЬТРАЦИЯ ---
    function filterTable() {
        const searchText = document.getElementById('searchInput').value.toLowerCase();
        const statusFilter = document.getElementById('statusFilter').value;
        const rows = document.querySelectorAll('#tasksBody tr');

        rows.forEach(row => {
            const content = row.querySelector('.task-content').textContent.toLowerCase();
            const status = row.querySelector('.task-status').textContent;

            const matchesText = content.includes(searchText);
            const matchesStatus = (statusFilter === 'ALL') || (status === statusFilter);

            row.style.display = (matchesText && matchesStatus) ? '' : 'none';
        });
    }

    document.getElementById('searchInput').addEventListener('input', filterTable);
    document.getElementById('statusFilter').addEventListener('change', filterTable);

    // --- УДАЛЕНИЕ ПО ID ИЗ ПОЛЯ ВВОДА ---
    document.getElementById('deleteByIdBtn').addEventListener('click', async () => {
        if (isAdmin || isManager) {
            alert("У вас нет прав на удаление задач.");
            return;
        }
        const idInput = document.getElementById('deleteIdInput');
        const taskId = idInput.value.trim();

        if (!taskId) {
            alert("Введите ID для удаления!");
            return;
        }

        if (!confirm(`Вы уверены, что хотите удалить задачу с ID ${taskId}?`)) return;

        const response = await fetch(`/api/tasks/${taskId}`, {
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${token}` }
        });

        if (response.ok) {
            const rows = document.querySelectorAll('#tasksBody tr');
            rows.forEach(row => {
                if (row.querySelector('.task-id').textContent === taskId) row.remove();
            });
            idInput.value = '';
            alert(`Задача ${taskId} успешно удалена.`);
        } else {
            alert("Ошибка! Возможно, задачи с таким ID не существует.");
        }
    });

    // Если менеджер или админ – загружаем список пользователей и показываем селект
    if (isManager || isAdmin) {
        loadUsers();
        document.getElementById('assigneeContainer').style.display = 'block';
    }

    async function loadUsers() {
        try {
            const response = await fetch('/api/tasks/users', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (!response.ok) throw new Error('Не удалось загрузить пользователей');
            const users = await response.json();
            const select = document.getElementById('taskAssignee');
            // Удалить опции, кроме первой
            select.innerHTML = '<option value="">Себе</option>';
            users.forEach(user => {
                // Исключаем самого текущего пользователя (его имя в JWT)
                if (user.username !== decodedToken.sub) {
                    select.innerHTML += `<option value="${user.username}">${user.username}</option>`;
                }
            });
        } catch (e) {
            console.error(e);
        }
    }

    // Добавляем кнопку "Мои задачи" для менеджера
    if (isManager) {
        document.getElementById('navLinks').innerHTML += `<a class="nav-link" href="#" onclick="loadMyTasks()">Мои задачи</a>`;
    }

    async function loadMyTasks() {
        const response = await fetch('/api/tasks/my', {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        if (response.ok) {
            const tasks = await response.json();
            const tbody = document.getElementById('tasksBody');
            tbody.innerHTML = '';
            tasks.forEach(task => addRowToTable(task));
        } else {
            alert('Ошибка загрузки ваших задач');
        }
    }

    // Принудительное открытие модального окна по кнопке (если data-bs-toggle не срабатывает)
    document.getElementById('addTaskBtn').addEventListener('click', function (e) {
        e.preventDefault();
        const modal = new bootstrap.Modal(document.getElementById('addTaskModal'));
        modal.show();
    }
}
</script>
</body>
</html>
