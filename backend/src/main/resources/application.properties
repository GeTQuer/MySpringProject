spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Время жизни jwt токена
testing.app.lifetime=86400000
# Секретный ключ для JWT токенов
testing.app.secret=MySuperSecretKeyForTaskTrackerApplicationWhichIsVeryLong

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
spring.data.web.pageable.page-serialization-mode=via_dto

#Запуск sql скрипт (если бд пуста) после того как Hibernate создаст таблицы
spring.jpa.defer-datasource-initialization=true

# Конфигурация интеграции с Gemini API

spring.ai.google.genai.api-key= ${GEMINI_API_KEY}
spring.ai.google.genai.chat.options.model=gemini-3.5-flash
